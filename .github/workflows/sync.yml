name: Daily data sync

# Refreshes the current season from the Naver API once a day and commits the
# updated players_data.json. The commit triggers the deploy workflow, so the
# live site stays current with no server. sync_data.py uses only the Python
# standard library, so no dependency install is needed.

on:
  schedule:
    # 20:00 UTC = 05:00 KST (next day) — after the previous day's games settle.
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync current season
        run: python sync_data.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain players_data.json)" ]; then
            git add players_data.json
            git commit -m "chore: daily data sync"
            git push
          else
            echo "No data changes today."
          fi
