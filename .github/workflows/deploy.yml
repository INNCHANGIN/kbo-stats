name: Deploy to GitHub Pages

# Builds the static frontend and publishes it to GitHub Pages on every push to
# main (and on demand). The build's prebuild step copies players_data.json into
# the bundle, so a data commit from the daily sync auto-redeploys the site.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # A commit pushed by the sync workflow's GITHUB_TOKEN does NOT fire the push
  # trigger above (GitHub's anti-recursion rule), so redeploy when that
  # workflow finishes instead.
  workflow_run:
    workflows: ["Daily data sync"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Always build from the tip of main so a workflow_run trigger (fired
      # before the sync's data commit is visible to github.sha) still picks up
      # the freshly committed data.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
